name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --extra dev

      - name: Run ruff check
        working-directory: ./backend
        run: uv run ruff check app tests

      - name: Run ruff format
        working-directory: ./backend
        run: uv run ruff format --check app tests

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run lint
        working-directory: ./frontend
        run: npm run lint

      - name: Run build
        working-directory: ./frontend
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: truman
          POSTGRES_PASSWORD: truman123
          POSTGRES_DB: trumanworld_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --extra dev

      - name: Run database migrations
        working-directory: ./backend
        env:
          TRUMANWORLD_DATABASE_URL: postgresql+psycopg://truman:truman123@localhost:5432/trumanworld_test
        run: uv run alembic upgrade head

      - name: Run tests
        working-directory: ./backend
        env:
          TRUMANWORLD_DATABASE_URL: postgresql+psycopg://truman:truman123@localhost:5432/trumanworld_test
          TRUMANWORLD_REDIS_URL: redis://localhost:6379/0
          TRUMANWORLD_ANTHROPIC_API_KEY: test-key
        run: uv run pytest -v --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: codecov-trumanworld
          fail_ci_if_error: false
