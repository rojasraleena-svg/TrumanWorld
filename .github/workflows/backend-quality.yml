name: Backend Quality

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "agents/**"
      - ".github/workflows/backend-quality.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "agents/**"
      - ".github/workflows/backend-quality.yml"
  workflow_dispatch:

concurrency:
  group: backend-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-ruff-check:
    name: Backend Ruff Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --group dev

      - name: Run ruff check
        working-directory: ./backend
        run: uv run ruff check app tests

  backend-ruff-format:
    name: Backend Ruff Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --group dev

      - name: Run ruff format
        working-directory: ./backend
        run: uv run ruff format --check app tests
