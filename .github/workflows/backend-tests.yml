name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "agents/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "agents/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --group dev

      - name: Run tests
        working-directory: ./backend
        env:
          TRUMANWORLD_ANTHROPIC_API_KEY: test-key
        run: uv run pytest -v --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: codecov-trumanworld
          fail_ci_if_error: false

  backend-db-migrations:
    name: Backend DB Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: truman
          POSTGRES_PASSWORD: truman123
          POSTGRES_DB: trumanworld_test
        options: >-
          --health-cmd "pg_isready -U truman -d trumanworld_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --group dev

      - name: Run database migrations
        working-directory: ./backend
        env:
          TRUMANWORLD_DATABASE_URL: postgresql+psycopg://truman:truman123@localhost:5432/trumanworld_test
        run: uv run alembic upgrade head
