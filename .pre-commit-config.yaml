default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        args: [-shellcheck=]

  - repo: local
    hooks:
      - id: backend-pytest
        name: backend-pytest
        entry: bash -lc 'cd backend && uv run pytest -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-build
        name: frontend-build
        entry: bash -lc 'cd frontend && npm run build'
        language: system
        pass_filenames: false
        stages: [pre-push]
