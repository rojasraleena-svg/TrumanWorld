<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Alice - 咖啡师，橙色系，活力 -->
  <defs>
    <linearGradient id="alice-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="50" cy="50" r="48" fill="url(#alice-bg)"/>

  <!-- 头发（马尾） -->
  <ellipse cx="50" cy="32" rx="22" ry="18" fill="#5c4033"/>
  <ellipse cx="72" cy="35" rx="8" ry="12" fill="#5c4033"/>
  <path d="M68 28 Q78 25, 75 45" stroke="#5c4033" stroke-width="6" fill="none"/>

  <!-- 脸 -->
  <ellipse cx="50" cy="43" rx="17" ry="15" fill="#f5d0b5"/>

  <!-- 眼睛 -->
  <ellipse cx="43" cy="41" rx="3" ry="3.5" fill="#2d2d2d"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.5" fill="#2d2d2d"/>
  <circle cx="44" cy="40" r="1" fill="white"/>
  <circle cx="58" cy="40" r="1" fill="white"/>

  <!-- 快乐的眉毛 -->
  <path d="M38 37 Q43 35, 48 37" stroke="#5c4033" stroke-width="2" fill="none"/>
  <path d="M52 37 Q57 35, 62 37" stroke="#5c4033" stroke-width="2" fill="none"/>

  <!-- 腮红 -->
  <ellipse cx="36" cy="47" rx="4" ry="2" fill="#fca5a5" opacity="0.5"/>
  <ellipse cx="64" cy="47" rx="4" ry="2" fill="#fca5a5" opacity="0.5"/>

  <!-- 大大的微笑 -->
  <path d="M42 52 Q50 60, 58 52" stroke="#c47a6a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 围裙 -->
  <path d="M32 100 L38 68 L50 72 L62 68 L68 100" fill="#fef3c7"/>
  <rect x="44" y="78" width="12" height="10" rx="1" fill="#fbbf24"/>

  <!-- 围裙带子 -->
  <path d="M38 68 Q50 62, 62 68" stroke="#fbbf24" stroke-width="2" fill="none"/>

  <!-- 咖啡杯小装饰 -->
  <circle cx="50" cy="83" r="4" fill="#ea580c"/>
  <path d="M48 81 Q50 79, 52 81" stroke="white" stroke-width="1" fill="none"/>
</svg>
