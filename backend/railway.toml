[build]
builder = "RAILPACK"
buildCommand = "mkdir -p /app/.uv-cache && cd backend && UV_CACHE_DIR=/app/.uv-cache uv sync --frozen"
watchPatterns = [
  "/backend/**",
  "/agents/**",
  "/scenarios/**",
  "/scripts/**",
]

[deploy]
startCommand = ""
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
