[build]
builder = "RAILPACK"
buildCommand = "mkdir -p /app/.uv-cache && cd backend && UV_CACHE_DIR=/app/.uv-cache uv sync --frozen"
watchPatterns = [
  "/backend/**",
  "/agents/**",
  "/scenarios/**",
  "/scripts/**",
]

[deploy]
preDeployCommand = "uv run --directory /app/backend alembic upgrade head"
startCommand = "uv run --directory /app/backend alembic upgrade head && uv run --directory /app/backend uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
