  cafe: "提供咖啡和简餐的场所，适合社交和工作"
  mall: "大型购物中心，可以购物、用餐、休闲"
  hospital: "医疗服务机构，提供看病、探病服务"
  plaza: "开放的公共空间，适合散步、社交、活动"
  office: "办公场所，用于工作和会议"

# 时间相关的建议
