# TrumanWorld 世界常识配置
# 这个文件定义了所有 agent 共享的世界知识

# =============================================================================
# 世界常识层（所有 agent 共享）
# =============================================================================

# 日常节律
daily_rhythm:
  lunch_time: "11:30-13:30"
  social_time: "18:00-22:00"
  work_days:
    - monday
    - tuesday
    - wednesday
    - thursday
    - friday
  # 睡眠时段：模拟引擎将在进入此时段后直接跳到次日清晨，节省 LLM 调用
  sleep_hours:
    start: 23   # 23:00 开始睡眠，跳过夜间
    end: 6      # 06:00 醒来（自然触发早晨 Planner）

# 地点用途定义
location_purposes:
  cafe:
    - 用餐
    - 喝咖啡
    - 社交
    - 工作
  mall:
    - 购物
    - 用餐
    - 休闲
    - 社交
  hospital:
    - 看病
    - 探病
    - 工作
  plaza:
    - 散步
    - 社交
    - 活动
    - 休息
  office:
    - 工作
    - 会议
    - 办公

# 社会常识/规范
social_norms:
  - "小镇居民通常在 11:30-13:30 去咖啡馆或商场吃午餐"
  - "傍晚 18:00-22:00 是人们社交的时间，常去广场、咖啡馆"
  - "海湾医院提供医疗服务，医院工作人员在此工作"
  - "港湾商场可以购物、用餐、休闲"
  - "街角咖啡馆是居民常去的社交场所"

# 地点描述（用于 agent 理解地点）
