# =============================================================================
# 工作配置（特定角色的工作安排）
# =============================================================================

# 轮班工作配置
shift_work_config:
  # 轮班类型定义
  shift_types:
    morning:
      name: "早班"
      start_hour: 6
      end_hour: 14
    evening:
      name: "晚班"
      start_hour: 14
      end_hour: 22
  
  # 默认轮班安排（按星期几）
  # 0=Monday, 1=Tuesday, 2=Wednesday, 3=Thursday, 4=Friday, 5=Saturday, 6=Sunday
  default_schedule:
    0: "morning"   # Monday
    1: "evening"   # Tuesday
    2: "morning"   # Wednesday
    3: "evening"   # Thursday
    4: "morning"   # Friday
    5: null        # Saturday - rest
    6: null        # Sunday - rest

# =============================================================================
# 世界健康度评估基准（前端使用）
# =============================================================================

health_metrics:
  # 剧情连贯性：基于累计动作拒绝率
  # 计算公式：max(0, 100 - 拒绝率 * continuity_penalty_factor)
  # 拒绝率 = rejections / (talks + moves + rejections)
  continuity:
    penalty_factor: 200        # 每1%拒绝率扣多少分（200 = 拒绝率50%时得0分）
    warning_threshold: 0.2     # 拒绝率超过此值显示警告提示
    trend_down_threshold: 0.15 # 拒绝率超过此值趋势显示为下降
    trend_stable_threshold: 0.05

  # 社交活跃度：基于每人每天对话次数（人均）
  # 计算公式：min(100, 每人每天对话次数 / baseline_talks_per_person_per_day * 100)
  social:
    baseline_talks_per_person_per_day: 30  # 达到此值即为100%
    trend_up_threshold: 10     # 每人每天超过此值趋势为上升
    trend_stable_threshold: 3  # 每人每天超过此值趋势为稳定（否则下降）

# =============================================================================
# 地点热度配置（地图活跃度显示）
# =============================================================================
location_heat:
  # 事件权重：不同事件类型对热度的贡献
  event_weights:
    talk: 1.5
    work: 1.0
    move: 0.6
    rest: 0.4
    plan: 0.5
    reflect: 0.5
    director_inject: 2.0
    director_broadcast: 2.0
    director_activity: 2.0
    director_shutdown: 2.0
    director_weather_change: 2.0

  # 归一化基准：达到此加权总分视为热度 1.0（满热度）
  # 增大此值可降低大多数地点的热度，使"非常活跃"更难达到
  # recent_events 最多 120 条，单一地点平均约 15-20 条
  # 平均每条加权约 1.0，15条 → 15分，基准设为 30 较合理
  normalization_baseline: 30

  # 热度等级阈值（0-1 之间，越高越难触发）
  thresholds:
    very_active: 0.7   # >= 此值显示"非常活跃"（红色）
    active: 0.4        # >= 此值显示"较活跃"（橙色）
    mild: 0.15         # >= 此值显示"一般"（绿色）
                       # < mild 显示"安静"（灰色）

  # 显示阈值：低于此值不显示热度光晕效果
  glow_threshold: 0.1

# =============================================================================
# 前端 UI 配置（数据加载、轮询、显示限制）
# =============================================================================
ui_config:
  # 地点详情弹窗 - 事件显示数量限制
  location_detail:
    max_events_display: 50  # 地点事件列表最多显示多少条

  # 情报流弹窗 - 事件加载配置
  intelligence_stream:
    max_events_load: 500       # 一次性加载的最大事件数
    poll_interval_ms: 5000     # 轮询间隔（毫秒）

  # 导演干预面板 - 记忆加载配置
  director_panel:
    max_memories_load: 100     # 加载的导演记忆数量
